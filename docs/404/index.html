<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | BK-TECH Academy</title>
    <link rel="icon" type="image/png" href="../assets/404-error.png" />
    <link rel="stylesheet" href="../src/output.css" />
  </head>
  <body class="error-page-body">
    <div class="error-page-container">
      <!-- Animated Background Shapes -->
      <div class="error-bg-shape error-shape-1"></div>
      <div class="error-bg-shape error-shape-2"></div>
      <div class="error-bg-shape error-shape-3"></div>

      <!-- Main Content -->
      <div class="error-content-wrapper">
        <!-- Logo -->
        <div class="error-logo">
          <h1 class="error-brand">
            BK-TECH <span class="error-brand-accent">ACADEMY</span>
          </h1>
        </div>

        <!-- 404 Image -->
        <div class="error-image-container">
          <img
            src="../assets/404-error.png"
            alt="404 Error"
            class="error-image"
          />
        </div>

        <!-- Error Message -->
        <div class="error-message-box">
          <h2 class="error-title">Oops! Page Not Found</h2>
          <p class="error-description">
            The page you're looking for seems to have wandered off into the
            digital void. Don't worry, even the best developers get lost
            sometimes!
          </p>
        </div>

        <!-- Action Buttons -->
        <div class="error-actions">
          <a href="../" class="error-btn error-btn-primary">
            <svg
              class="error-btn-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Back to Home
          </a>
          <a href="../Dashboard/" class="error-btn error-btn-secondary">
            <svg
              class="error-btn-icon"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="9" rx="1"></rect>
              <rect x="14" y="3" width="7" height="5" rx="1"></rect>
              <rect x="14" y="12" width="7" height="9" rx="1"></rect>
              <rect x="3" y="16" width="7" height="5" rx="1"></rect>
            </svg>
            Go to Dashboard
          </a>
        </div>

        <!-- Error Code -->
        <div class="error-code-display">
          <span class="error-code-label">Error Code:</span>
          <span class="error-code-value">404</span>
        </div>
      </div>
    </div>
  </body>
</html>
