<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BK-TECH ACADEMY - Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="./src/output.css" />
    <link rel="icon" type="image/png" href="./assets/icon.png" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://googleapis.com" rel="stylesheet" />
    <style>
      * {
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #000428 0%, #4b667d 100%);
        background-attachment: fixed;
      }

      .glass-morphism {
        background: rgba(16, 52, 87, 0.7);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(59, 130, 246, 0.2);
        box-shadow:
          0 5.6px 22.4px 0 rgba(0, 0, 0, 0.5),
          0 0 56px rgba(59, 130, 246, 0.1);
      }

      .input-field {
        background: rgba(0, 30, 60, 0.5);
        border: 1.4px solid rgba(59, 130, 246, 0.3);
        transition: all 0.3s ease;
      }

      .input-field:focus {
        background: rgba(0, 40, 80, 0.6);
        border-color: #3b82f6;
        box-shadow:
          0 0 0 2.8px rgba(59, 130, 246, 0.1),
          0 0 14px rgba(59, 130, 246, 0.3);
        outline: none;
      }

      .input-field:focus + .input-icon {
        color: #3b82f6;
      }

      .checkbox-wrapper {
        position: relative;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
      }

      .checkbox-input {
        appearance: none;
        width: 16.8px;
        height: 16.8px;
        border: 1.4px solid rgba(59, 130, 246, 0.5);
        border-radius: 4.2px;
        background: rgba(0, 30, 60, 0.5);
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
      }

      .checkbox-input:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .checkbox-input:checked {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        border-color: #3b82f6;
        box-shadow: 0 0 10.5px rgba(59, 130, 246, 0.5);
      }

      .checkbox-input:checked::after {
        content: "";
        position: absolute;
        left: 4.9px;
        top: 2.1px;
        width: 4.2px;
        height: 8.4px;
        border: solid white;
        border-width: 0 1.4px 1.4px 0;
        transform: rotate(45deg);
      }

      .glow-text {
        text-shadow: 0 0 14px rgba(59, 130, 246, 0.5);
      }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        box-shadow: 0 2.8px 14px rgba(59, 130, 246, 0.4);
        transition: all 0.3s ease;
      }

      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, #2563eb, #1e40af);
        box-shadow: 0 4.2px 21px rgba(59, 130, 246, 0.6);
        transform: translateY(-1.4px);
      }

      .btn-primary:disabled {
        background: linear-gradient(135deg, #374151, #1f2937);
        box-shadow: none;
        cursor: not-allowed;
        opacity: 0.5;
      }

      .floating-shapes {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(28px);
        opacity: 0.3;
        animation: float 20s infinite ease-in-out;
      }

      .shape:nth-child(1) {
        width: 210px;
        height: 210px;
        background: #3b82f6;
        top: 10%;
        left: 10%;
        animation-delay: 0s;
      }

      .shape:nth-child(2) {
        width: 140px;
        height: 140px;
        background: #1d4ed8;
        top: 60%;
        right: 10%;
        animation-delay: 5s;
      }

      .shape:nth-child(3) {
        width: 175px;
        height: 175px;
        background: #60a5fa;
        bottom: 10%;
        left: 50%;
        animation-delay: 10s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(21px, -21px) scale(1.1);
        }
        66% {
          transform: translate(-14px, 14px) scale(0.9);
        }
      }

      .slide-in {
        animation: slideIn 0.6s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(21px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .requirement-item {
        transition: all 0.3s ease;
      }

      .requirement-item:hover {
        transform: translateX(3.5px);
        background: rgba(59, 130, 246, 0.05);
      }

      .error-message {
        animation: shake 1s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-7px);
        }
        75% {
          transform: translateX(7px);
        }
      }

      .success-message {
        animation: successPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      @keyframes successPop {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
      option {
        background-color: #1f2937; /* Matches bg-gray-800 */
        color: white;
      }
      #country-code::-webkit-scrollbar {
        display: none; /* Hides the scrollbar for Chrome/Safari/Edge */
      }

      #country-code {
        -ms-overflow-style: none; /* Hides for older IE and Edge */
        scrollbar-width: none; /* Hides for Firefox */
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-3 relative">
    <!-- Floating Background Shapes -->
    <div class="floating-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>
    <!-- Login Container -->
    <div
      id="login-container"
      class="glass-morphism rounded-2xl p-4 sm:p-6 md:p-8 max-w-md w-full relative z-10 slide-in"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white glow-text mb-2">
          BK-TECH <span class="text-blue-400">ACADEMY</span>
        </h1>
        <p class="text-gray-400 text-sm">
          Welcome back! Please login to your account.
        </p>
      </div>

      <form id="user-login-form" class="space-y-5">
        <div>
          <label
            class="block text-blue-200 font-medium mb-1.5 text-xs uppercase tracking-wide"
            >Email Address</label
          >
          <div class="relative">
            <input
              type="email"
              required
              id="singup-email"
              placeholder="name@example.com"
              class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500 text-sm invalid:border-red-500 invalid:text-pink-900 focus:border-sky-500 focus:outline focus:outline-sky-500 focus:invalid:border-red-500 focus:invalid:outline-red-500"
            />
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-1.5">
            <label
              for="singup-password"
              class="text-blue-200 font-medium text-xs uppercase tracking-wide"
              >Password</label
            >
            <a href="#" class="text-blue-400 text-xs hover:underline"
              >Forgot?</a
            >
          </div>
          <div class="relative">
            <input
              type="password"
              id="singup-password"
              required
              placeholder="••••••••"
              class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500 text-sm focus:border-sky-500 focus:outline focus:outline-sky-500"
            />
            <div
              class="absolute right-3 top-1/2 -translate-y-1/2 toggle-login-password cursor-pointer"
            >
              <svg
                class="w-3.5 h-3.5 toggle-password"
                fill="none"
                stroke="white"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember"
            class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500"
          />
          <label for="remember" class="ml-2 text-xs text-gray-300"
            >Keep me logged in</label
          >
        </div>

        <button
          type="submit"
          class="btn-primary w-full py-3 text-white font-bold rounded-lg text-sm uppercase tracking-wider transition-all"
        >
          Sign In
        </button>

        <p class="text-center text-gray-400 text-xs">
          Don't have an account?
          <button
            type="button"
            id="show-signup"
            class="text-blue-400 font-semibold hover:text-blue-300 font-display: swap;"
          >
            Create One
          </button>
        </p>
      </form>
    </div>
    <!-- Signup Container -->
    <div
      id="signup-container"
      class="glass-morphism rounded-2xl p-4 sm:p-6 md:p-8 max-w-xl w-full relative z-10 slide-in hidden"
    >
      <!-- Header -->
      <div class="text-center mb-6">
        <h1
          class="text-3xl sm:text-4xl md:text-5xl font-bold text-white glow-text mb-1.5"
        >
          BK-TECH <span class="text-blue-400">ACADEMY</span>
        </h1>
        <h3 class="text-base sm:text-lg font-semibold text-blue-300 mb-1.5">
          Create Account
        </h3>
        <p class="text-gray-400 text-xs sm:text-sm">
          Join BK-TECH Academy today
        </p>
      </div>

      <!-- Form -->
      <form class="space-y-3.5" id="userForm">
        <!-- Full Name -->
        <div class="relative">
          <label
            for="Name"
            class="block text-blue-200 font-medium mb-1.5 text-xs uppercase tracking-wide"
          >
            Full Name
          </label>
          <div class="relative">
            <input
              type="text"
              name="fullname"
              id="Name"
              required
              oninput="this.value = this.value.replace(/[0-9]/g, '')"
              placeholder="Enter your full name"
              class="invalid:border-red-500 focus:border-sky-500 focus:outline focus:outline-sky-500 focus:invalid:border-red-500 focus:invalid:outline-red-500 input-field w-full px-3 py-2 sm:py-3 rounded-lg text-white placeholder-gray-500 pr-9 text-sm"
            />
            <div
              class="absolute right-3 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-3.5 h-3.5 togreen"
                fill="none"
                stroke="white"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="relative">
          <label
            for="Signin-email"
            class="block text-blue-200 font-medium mb-1.5 text-xs uppercase tracking-wide"
          >
            Email Address
          </label>
          <div class="relative">
            <input
              type="email"
              id="Signin-email"
              required
              placeholder="your.email@example.com"
              class="invalid:border-red-500 invalid:text-red-500 focus:border-sky-500 focus:outline focus:outline-sky-500 focus:invalid:border-red-500 focus:invalid:outline-red-500 input-field w-full px-3 py-2 sm:py-3 rounded-lg text-white placeholder-gray-500 pr-9 text-sm"
            />
            <div
              class="absolute right-3 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-3.5 h-3.5 togreen"
                fill="none"
                stroke="white"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Phone -->
        <div class="relative">
          <label
            for="phone"
            class="block text-blue-200 font-medium mb-1.5 text-xs uppercase tracking-wide"
          >
            Phone Number
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 flex items-center">
              <select
                onclick="updateField()"
                id="country-code"
                class="bg-transparent text-gray-400 text-sm py-2 sm:py-3 pl-3 pr-2 border-r border-gray-700 outline-none rounded-l-lg appearance-none cursor-pointer"
                style="width: fit-content; min-width: 70px"
              >
                <option
                  value="+251"
                  data-pattern="[97][0-9]{8}"
                  data-placeholder="912 345 678"
                >
                  🇪🇹 +251
                </option>
                <option
                  value="+1"
                  data-pattern="[0-9]{10}"
                  data-placeholder="202 555 0123"
                >
                  🇺🇸 +1
                </option>
                <option
                  value="+44"
                  data-pattern="[0-9]{10}"
                  data-placeholder="7700 900123"
                >
                  🇬🇧 +44
                </option>
                <option
                  value="+254"
                  data-pattern="[0-9]{9}"
                  data-placeholder="712 345 678"
                >
                  🇰🇪 +254
                </option>
                <option
                  value="+971"
                  data-pattern="[0-9]{9}"
                  data-placeholder="50 123 4567"
                >
                  🇦🇪 +971
                </option>
                <option
                  value="+91"
                  data-pattern="[0-9]{10}"
                  data-placeholder="98123 45678"
                >
                  🇮🇳 +91
                </option>
                <option
                  value="+255"
                  data-pattern="[0-9]{9}"
                  data-placeholder="612 345 678"
                >
                  🇹🇿 +255
                </option>
                <option
                  value="+256"
                  data-pattern="[0-9]{9}"
                  data-placeholder="712 345 678"
                >
                  🇺🇬 +256
                </option>
                <option
                  value="+252"
                  data-pattern="[0-9]{9}"
                  data-placeholder="61 2345678"
                >
                  🇸🇴 +252
                </option>
                <option
                  value="+253"
                  data-pattern="[0-9]{8}"
                  data-placeholder="77 12 34 56"
                >
                  🇩🇯 +253
                </option>
                <option
                  value="+249"
                  data-pattern="[0-9]{9}"
                  data-placeholder="91 234 5678"
                >
                  🇸🇩 +249
                </option>
                <option
                  value="+234"
                  data-pattern="[0-9]{10}"
                  data-placeholder="803 123 4567"
                >
                  🇳🇬 +234
                </option>
                <option
                  value="+27"
                  data-pattern="[0-9]{9}"
                  data-placeholder="82 123 4567"
                >
                  🇿🇦 +27
                </option>
                <option
                  value="+966"
                  data-pattern="5[0-9]{8}"
                  data-placeholder="51 234 5678"
                >
                  🇸🇦 +966
                </option>
                <option
                  value="+49"
                  data-pattern="[0-9]{10,11}"
                  data-placeholder="151 23456789"
                >
                  🇩🇪 +49
                </option>
                <option
                  value="+33"
                  data-pattern="[0-9]{9}"
                  data-placeholder="6 12 34 56 78"
                >
                  🇫🇷 +33
                </option>
                <option
                  value="+86"
                  data-pattern="[0-9]{11}"
                  data-placeholder="138 1234 5678"
                >
                  🇨🇳 +86
                </option>
                <option
                  value="+81"
                  data-pattern="[0-9]{10}"
                  data-placeholder="90 1234 5678"
                >
                  🇯🇵 +81
                </option>
                <option
                  value="+61"
                  data-pattern="[0-9]{9}"
                  data-placeholder="412 345 678"
                >
                  🇦🇺 +61
                </option>
                <option
                  value="+55"
                  data-pattern="[0-9]{11}"
                  data-placeholder="11 91234 5678"
                >
                  🇧🇷 +55
                </option>
                <!-- Add more countries as needed -->
              </select>
            </div>
            <input
              type="tel"
              required
              id="phone"
              pattern="[0-9]{6,14}"
              maxlength="15"
              oninput="this.value = this.value.replace(/[a-zA-Z]/g, '')"
              placeholder="912 34 56 78"
              title="Please enter a valid phone number(6-14 digits) or count yode "
              class="invalid:border-red-500 invalid:text-red-500 focus:border-sky-500 focus:outline focus:outline-sky-500 focus:invalid:border-red-500 focus:invalid:outline-red-500 input-field w-full px-3 py-2 sm:py-3 rounded-lg text-white placeholder-gray-500 input-field w-full pl-24 pr-3 py-2 sm:py-3 rounded-lg bg-gray-800 text-white placeholder-gray-500 text-sm"
            />

            <div
              class="absolute right-3 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-3.5 h-3.5 togreen"
                fill="none"
                stroke="white"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="relative">
          <label
            for="signin-password"
            class="block text-blue-200 font-medium mb-1.5 text-xs uppercase tracking-wide"
          >
            Password
          </label>
          <div class="relative">
            <input
              type="password"
              id="signin-password"
              max="20"
              placeholder="Create a strong password"
              class="focus:border-sky-500 focus:outline focus:outline-sky-500 input-field w-full px-3 py-2 sm:py-3 rounded-lg text-white placeholder-gray-500 pr-9 text-sm"
            />
            <div
              class="absolute right-3 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-3.5 h-3.5 toggle-password togreen"
                fill="none"
                stroke="white"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Password Requirements -->
        <div
          class="bg-blend-overlay rounded-lg p-3 sm:p-3.5 border border-blue-900/30"
        >
          <h4 class="text-blue-300 font-semibold mb-2 text-xs sm:text-sm">
            Password Requirements:
          </h4>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
            <label
              class="requirement-item flex items-center gap-2 p-1.5 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                id="length-checkbox"
                class="checkbox-input abuki"
                disabled
              />
              <span class="text-gray-300 text-xs">At least 10 characters</span>
            </label>

            <label
              class="requirement-item flex items-center gap-2 p-1.5 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                id="spectial-cacracters"
                class="checkbox-input abuki"
                disabled
              />
              <span class="text-gray-300 text-xs">No special characters</span>
            </label>

            <label
              class="requirement-item flex items-center gap-2 p-1.5 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                class="checkbox-input abuki"
                disabled
                id="uppercases"
              />
              <span class="text-gray-300 text-xs">1 Uppercase letter</span>
            </label>

            <label
              class="requirement-item flex items-center gap-2 p-1.5 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                class="checkbox-input abuki"
                disabled
                id="smalleters"
              />
              <span class="text-gray-300 text-xs">1 Lowercase letter</span>
            </label>

            <label
              class="requirement-item flex items-center gap-2 p-1.5 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                class="checkbox-input abuki"
                disabled
                id="Numbers"
              />
              <span class="text-gray-300 text-xs">At least 1 number</span>
            </label>

            <label
              class="requirement-item flex items-center gap-2 p-1.5 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                id="symbols"
                class="checkbox-input abuki"
                disabled
              />
              <span class="text-gray-300 text-xs">At least 1 symbol</span>
            </label>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="relative">
          <label
            for="confirmed"
            class="block text-blue-200 font-medium mb-1.5 text-xs uppercase tracking-wide"
          >
            Confirm Password
          </label>
          <div class="relative">
            <input
              type="password"
              id="confirmed"
              placeholder="Re-enter your password"
              class="focus:border-sky-500 focus:outline focus:outline-sky-500 input-field w-full px-3 py-2 sm:py-3 rounded-lg text-white placeholder-gray-500 pr-9 text-sm"
            />
            <div
              class="absolute right-3 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-3.5 h-3.5 toggle-password togreen"
                fill="none"
                stroke="white"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                ></path>
              </svg>
            </div>
          </div>
          <span
            id="error"
            class="text-red-400 text-xs mt-1.5 block error-message"
          ></span>
        </div>

        <!-- Submit Button -->
        <div class="pt-3">
          <button
            disabled
            id="sing-in"
            type="submit"
            class="btn-primary w-full py-2 sm:py-3 px-4 text-white font-bold rounded-lg text-sm sm:text-base uppercase tracking-wider"
          >
            Create Account
          </button>
        </div>

        <!-- Success Message -->
        <div
          id="success-msg"
          class="hidden mt-3 p-3 bg-gradient-to-r from-green-500 to-emerald-500 rounded-lg text-white text-center font-semibold text-sm success-message"
        >
          <svg
            class="w-4 h-4 inline-block mr-1.5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            ></path>
          </svg>
          Account created successfully!
        </div>

        <!-- Login Link -->
        <div class="text-center pt-3">
          <p class="text-gray-400 text-xs">
            Already have an account?
            <button
              type="button"
              id="show-login"
              class="text-blue-400 hover:text-blue-300 font-semibold transition-colors"
            >
              Sign In
            </button>
          </p>
        </div>
      </form>
    </div>
    <script src="./src/main.js"></script>
  </body>
</html>
