<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BK-TECH ACADEMY - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Poppins", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #000428 0%, #004e92 100%);
        background-attachment: fixed;
      }

      .glass-morphism {
        background: rgba(0, 20, 40, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(59, 130, 246, 0.2);
        box-shadow:
          0 8px 32px 0 rgba(0, 0, 0, 0.5),
          0 0 80px rgba(59, 130, 246, 0.1);
      }

      .input-field {
        background: rgba(0, 30, 60, 0.5);
        border: 2px solid rgba(59, 130, 246, 0.3);
        transition: all 0.3s ease;
      }

      .input-field:focus {
        background: rgba(0, 40, 80, 0.6);
        border-color: #3b82f6;
        box-shadow:
          0 0 0 4px rgba(59, 130, 246, 0.1),
          0 0 20px rgba(59, 130, 246, 0.3);
        outline: none;
      }

      .input-field:focus + .input-icon {
        color: #3b82f6;
      }

      .checkbox-wrapper {
        position: relative;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
      }

      .checkbox-input {
        appearance: none;
        width: 24px;
        height: 24px;
        border: 2px solid rgba(59, 130, 246, 0.5);
        border-radius: 6px;
        background: rgba(0, 30, 60, 0.5);
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
      }

      .checkbox-input:disabled {
        cursor: not-allowed;
        opacity: 0.6;
      }

      .checkbox-input:checked {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        border-color: #3b82f6;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
      }

      .checkbox-input:checked::after {
        content: "";
        position: absolute;
        left: 7px;
        top: 3px;
        width: 6px;
        height: 12px;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }

      .glow-text {
        text-shadow: 0 0 20px rgba(59, 130, 246, 0.5);
      }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        transition: all 0.3s ease;
      }

      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, #2563eb, #1e40af);
        box-shadow: 0 6px 30px rgba(59, 130, 246, 0.6);
        transform: translateY(-2px);
      }

      .btn-primary:disabled {
        background: linear-gradient(135deg, #374151, #1f2937);
        box-shadow: none;
        cursor: not-allowed;
        opacity: 0.5;
      }

      .floating-shapes {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px);
        opacity: 0.3;
        animation: float 20s infinite ease-in-out;
      }

      .shape:nth-child(1) {
        width: 300px;
        height: 300px;
        background: #3b82f6;
        top: 10%;
        left: 10%;
        animation-delay: 0s;
      }

      .shape:nth-child(2) {
        width: 200px;
        height: 200px;
        background: #1d4ed8;
        top: 60%;
        right: 10%;
        animation-delay: 5s;
      }

      .shape:nth-child(3) {
        width: 250px;
        height: 250px;
        background: #60a5fa;
        bottom: 10%;
        left: 50%;
        animation-delay: 10s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -30px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
      }

      .slide-in {
        animation: slideIn 0.6s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .requirement-item {
        transition: all 0.3s ease;
      }

      .requirement-item:hover {
        transform: translateX(5px);
        background: rgba(59, 130, 246, 0.05);
      }

      .error-message {
        animation: shake 0.5s ease;
      }

      @keyframes shake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-10px);
        }
        75% {
          transform: translateX(10px);
        }
      }

      .success-message {
        animation: successPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      }

      @keyframes successPop {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4 relative">
    <!-- Floating Background Shapes -->
    <div class="floating-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>

    <!-- Main Container -->
    <div
      class="glass-morphism rounded-3xl p-6 sm:p-8 md:p-12 max-w-2xl w-full relative z-10 slide-in"
    >
      <!-- Header -->
      <div class="text-center mb-8">
        <h1
          class="text-4xl sm:text-5xl md:text-6xl font-bold text-white glow-text mb-2"
        >
          BK-TECH <span class="text-blue-400">ACADEMY</span>
        </h1>
        <h3 class="text-xl sm:text-2xl font-semibold text-blue-300 mb-2">
          Create Account
        </h3>
        <p class="text-gray-400 text-sm sm:text-base">
          Join BK-TECH Academy today
        </p>
      </div>

      <!-- Form -->
      <form class="space-y-5">
        <!-- Full Name -->
        <div class="relative">
          <label
            for="name"
            class="block text-blue-200 font-medium mb-2 text-sm uppercase tracking-wide"
          >
            Full Name
          </label>
          <div class="relative">
            <input
              type="text"
              name="fullname"
              id="name"
              required
              placeholder="Enter your full name"
              class="input-field w-full focus:border-sky-500 focus:outline focus:outline-sky-500 px-4 py-3 sm:py-4 rounded-xl text-white placeholder-gray-500 pr-12"
            />
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Email -->
        <div class="relative">
          <label
            for="email"
            class="block text-blue-200 font-medium mb-2 text-sm uppercase tracking-wide"
          >
            Email Address
          </label>
          <div class="relative">
            <input
              type="email"
              id="email"
              required
              placeholder="your.email@example.com"
              class="invalid:border-pink-500 invalid:text-pink-600 focus:border-sky-500 focus:outline focus:outline-sky-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500 input-field w-full px-4 py-3 sm:py-4 rounded-xl text-white placeholder-gray-500 pr-12"
            />
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Phone -->
        <div class="relative">
          <label
            for="phone"
            class="block text-blue-200 font-medium mb-2 text-sm uppercase tracking-wide"
          >
            Phone Number
          </label>
          <div class="relative">
            <input
              type="tel"
              required
              id="phone"
              placeholder="+1 (555) 000-0000"
              class="focus:border-sky-500 focus:outline focus:outline-sky-500 input-field w-full px-4 py-3 sm:py-4 rounded-xl text-white placeholder-gray-500 pr-12"
            />
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-5 h-5"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Password -->
        <div class="relative">
          <label
            for="passsword"
            class="block text-blue-200 font-medium mb-2 text-sm uppercase tracking-wide"
          >
            Password
          </label>
          <div class="relative">
            <input
              type="password"
              id="passsword"
              max="20"
              placeholder="Create a strong password"
              class="focus:border-sky-500 focus:outline focus:outline-sky-500 input-field w-full px-4 py-3 sm:py-4 rounded-xl text-white placeholder-gray-500 pr-12"
            />
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-5 h-5 toggle-password"
                fill="none"
                stroke="red"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
                ></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Password Requirements -->
        <div
          class="bg-black/30 rounded-xl p-4 sm:p-5 border border-blue-900/30"
        >
          <h4 class="text-blue-300 font-semibold mb-3 text-sm sm:text-base">
            Password Requirements:
          </h4>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <label
              class="requirement-item flex items-center gap-3 p-2 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                id="length-checkbox"
                class="checkbox-input abuki"
                disabled
              />
              <span class="text-gray-300 text-xs sm:text-sm"
                >At least 10 characters</span
              >
            </label>

            <label
              class="requirement-item flex items-center gap-3 p-2 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                id="spectial-cacracters"
                class="checkbox-input abuki"
                disabled
              />
              <span class="text-gray-300 text-xs sm:text-sm"
                >No special characters</span
              >
            </label>

            <label
              class="requirement-item flex items-center gap-3 p-2 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                class="checkbox-input abuki"
                disabled
                id="uppercases"
              />
              <span class="text-gray-300 text-xs sm:text-sm"
                >1 Uppercase letter</span
              >
            </label>

            <label
              class="requirement-item flex items-center gap-3 p-2 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                class="checkbox-input abuki"
                disabled
                id="smalleters"
              />
              <span class="text-gray-300 text-xs sm:text-sm"
                >1 Lowercase letter</span
              >
            </label>

            <label
              class="requirement-item flex items-center gap-3 p-2 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                class="checkbox-input abuki"
                disabled
                id="Numbers"
              />
              <span class="text-gray-300 text-xs sm:text-sm"
                >At least 1 number</span
              >
            </label>

            <label
              class="requirement-item flex items-center gap-3 p-2 rounded-lg cursor-pointer"
            >
              <input
                type="checkbox"
                id="symbols"
                class="checkbox-input abuki"
                disabled
              />
              <span class="text-gray-300 text-xs sm:text-sm"
                >At least 1 symbol</span
              >
            </label>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="relative">
          <label
            for="confirmed"
            class="block text-blue-200 font-medium mb-2 text-sm uppercase tracking-wide"
          >
            Confirm Password
          </label>
          <div class="relative">
            <input
              type="password"
              id="confirmed"
              placeholder="Re-enter your password"
              class="focus:border-sky-500 focus:outline focus:outline-sky-500 input-field w-full px-4 py-3 sm:py-4 rounded-xl text-white placeholder-gray-500 pr-12"
            />
            <div
              class="absolute right-4 top-1/2 -translate-y-1/2 input-icon text-gray-500 transition-colors"
            >
              <svg
                class="w-5 h-5 toggle-password"
                fill="none"
                stroke="red"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
                ></path>
              </svg>
            </div>
          </div>
          <span
            id="error"
            class="text-red-400 text-sm mt-2 block error-message"
          ></span>
        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button
            disabled
            id="sing-in"
            type="submit"
            class="btn-primary w-full py-3 sm:py-4 px-6 text-white font-bold rounded-xl text-base sm:text-lg uppercase tracking-wider"
          >
            Create Account
          </button>
        </div>

        <!-- Success Message -->
        <div
          id="success-msg"
          class="hidden mt-4 p-4 bg-gradient-to-r from-green-500 to-emerald-500 rounded-xl text-white text-center font-semibold success-message"
        >
          <svg
            class="w-6 h-6 inline-block mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            ></path>
          </svg>
          Account created successfully!
        </div>

        <!-- Login Link -->
        <div class="text-center pt-4">
          <p class="text-gray-400 text-sm">
            Already have an account?
            <a
              href="#"
              class="text-blue-400 hover:text-blue-300 font-semibold transition-colors"
              >Sign In</a
            >
          </p>
        </div>
      </form>
    </div>

    <script src="./src/index.js"></script>
  </body>
</html>
