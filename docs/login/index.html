<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BK-TECH Academy - Login</title>
    <link type="icon" href="../assets/icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

      * {
        font-family: "Inter", sans-serif;
      }

      body {
        background: linear-gradient(
          135deg,
          #000000 0%,
          #1a1a2e 50%,
          #000000 100%
        );
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background:
          radial-gradient(
            circle at 20% 50%,
            rgba(14, 141, 232, 0.15) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(0, 200, 255, 0.1) 0%,
            transparent 50%
          );
        animation: pulse 8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .floating-shapes {
        position: absolute;
        width: 100%;
        height: 100%;
        overflow: hidden;
        z-index: 0;
      }

      .shape {
        position: absolute;
        border-radius: 50%;
        filter: blur(60px);
        animation: float 20s infinite ease-in-out;
      }

      .shape:nth-child(1) {
        width: 300px;
        height: 300px;
        background: rgba(0, 149, 255, 0.2);
        top: 10%;
        left: 10%;
        animation-delay: 0s;
      }

      .shape:nth-child(2) {
        width: 250px;
        height: 250px;
        background: rgba(0, 200, 255, 0.15);
        top: 60%;
        right: 10%;
        animation-delay: 5s;
      }

      .shape:nth-child(3) {
        width: 200px;
        height: 200px;
        background: rgba(0, 180, 255, 0.1);
        bottom: 10%;
        left: 50%;
        animation-delay: 10s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -30px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
      }

      .glass-morphism {
        background: rgba(1, 22, 62, 0.471);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(0, 149, 255, 0.3);
        box-shadow:
          0 8px 32px 0 rgba(0, 149, 255, 0.2),
          inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
      }

      .glow-text {
        text-shadow:
          0 0 20px rgba(0, 149, 255, 0.5),
          0 0 40px rgba(0, 149, 255, 0.3);
      }

      .input-field {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(0, 149, 255, 0.3);
        transition: all 0.3s ease;
      }

      .input-field:focus {
        background: rgba(0, 0, 0, 0.7);
        border-color: #0095ff;
        box-shadow: 0 0 20px rgba(0, 149, 255, 0.3);
      }

      .btn-primary {
        background: linear-gradient(135deg, #0095ff 0%, #00c8ff 100%);
        box-shadow: 0 4px 15px rgba(0, 149, 255, 0.4);
        position: relative;
        overflow: hidden;
      }

      .btn-primary::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        transition: left 0.5s;
      }

      .btn-primary:hover::before {
        left: 100%;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px rgba(0, 149, 255, 0.6);
      }

      .slide-in {
        animation: slideIn 0.6s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .toggle-password {
        transition: all 0.3s ease;
        opacity: 0.6;
      }

      .toggle-password:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      input[type="checkbox"] {
        accent-color: #0095ff;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div class="floating-shapes">
      <div class="shape"></div>
      <div class="shape"></div>
      <div class="shape"></div>
    </div>

    <div
      id="login-page"
      class="glass-morphism rounded-2xl p-8 max-w-md w-full relative z-10 slide-in"
    >
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white glow-text mb-2">
          BK-TECH <span class="text-blue-400">ACADEMY</span>
        </h1>
        <p class="text-gray-400 text-sm">
          Welcome back! Please login to your account.
        </p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label
            for="login-email"
            class="block text-blue-200 font-medium mb-2 text-xs uppercase tracking-wide"
          >
            Email Address
          </label>
          <div class="relative">
            <input
              type="email"
              required
              id="login-email"
              placeholder="name@example.com"
              class="input-field w-full px-4 py-3 rounded-lg text-white placeholder-gray-500 text-sm"
            />
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-2">
            <label
              for="login-password"
              class="text-blue-200 font-medium text-xs uppercase tracking-wide"
            >
              Password
            </label>
            <a
              href="#"
              class="text-blue-400 text-xs hover:underline hover:text-blue-300 transition"
            >
              Forgot?
            </a>
          </div>
          <div class="relative">
            <input
              type="password"
              id="login-password"
              required
              placeholder="••••••••"
              class="input-field w-full px-4 py-3 pr-12 rounded-lg text-white placeholder-gray-500 text-sm"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 toggle-password cursor-pointer"
              onclick="togglePassword()"
            >
              <svg
                id="eye-icon"
                class="w-5 h-5 text-gray-400 hover:text-white transition"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                ></path>
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                ></path>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center">
          <input
            type="checkbox"
            id="remember"
            class="w-4 h-4 rounded border-gray-300 cursor-pointer"
          />
          <label
            for="remember"
            class="ml-2 text-sm text-gray-300 cursor-pointer"
          >
            Keep me logged in
          </label>
        </div>

        <button
          type="submit"
          class="btn-primary w-full py-3 text-white font-bold rounded-lg text-sm uppercase tracking-wider transition-all"
        >
          Sign In
        </button>

        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-700"></div>
          </div>
          <div class="relative flex justify-center text-xs uppercase">
            <span class="bg-transparent px-2 text-gray-500"
              >Or continue with</span
            >
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <button
            type="button"
            class="flex items-center justify-center px-4 py-2 border border-gray-700 rounded-lg hover:border-blue-500 transition-all hover:bg-blue-500/10"
          >
            <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
              <path
                fill="#4285F4"
                d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              />
              <path
                fill="#34A853"
                d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              />
              <path
                fill="#FBBC05"
                d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              />
              <path
                fill="#EA4335"
                d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              />
            </svg>
            <span class="text-white text-sm">Google</span>
          </button>
          <button
            type="button"
            class="flex items-center justify-center px-4 py-2 border border-gray-700 rounded-lg hover:border-blue-500 transition-all hover:bg-blue-500/10"
          >
            <svg class="w-5 h-5 mr-2" fill="white" viewBox="0 0 24 24">
              <path
                d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"
              />
            </svg>
            <span class="text-white text-sm">GitHub</span>
          </button>
        </div>

        <p class="text-center text-gray-400 text-sm mt-6">
          Don't have an account?
          <button
            id="go-create"
            class="text-blue-400 font-semibold hover:text-blue-300 transition"
          >
            Create One
          </button>
        </p>
      </form>
    </div>

    <script src="../src/main.js"></script>
  </body>
</html>
